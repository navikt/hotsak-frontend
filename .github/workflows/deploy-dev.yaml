name: Bygg, deploy til dev-gcp og lag release

on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENCE'
      - 'CODEOWNERS'
    branches:
      - main
      - henleggelse

jobs:
  test:
    name: Kjør tester
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Sjekk ut koden
        uses: actions/checkout@v6
      - name: Autentiser med GitHub NPM registry
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.READER_TOKEN }}" >> ~/.npmrc
          echo "@navikt:registry=https://npm.pkg.github.com" >> ~/.npmrc
      - name: Sett opp Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Installer avhengigheter
        run: pnpm install --frozen-lockfile
        working-directory: client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Kjør enhetstester
        run: pnpm run test:ci
        working-directory: client
      - name: Installer Playwright
        run: pnpm exec playwright install --with-deps chromium
        working-directory: client
      - name: Kjør E2E-tester
        run: pnpm run e2e
        working-directory: client
      - name: Playwright test summary
        if: ${{ !cancelled() }}
        working-directory: client
        run: |
          if [ -f playwright-results.json ]; then
            PASSED=$(jq '.stats.expected' playwright-results.json)
            FAILED=$(jq '.stats.unexpected' playwright-results.json)
            SKIPPED=$(jq '.stats.skipped' playwright-results.json)
            FLAKY=$(jq '.stats.flaky' playwright-results.json)
            TOTAL=$((PASSED + FAILED + SKIPPED + FLAKY))
            if [ "$FAILED" -eq 0 ]; then
              STATUS="✅"
            else
              STATUS="❌"
            fi
            echo "## Playwright Test Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Test Results: ${STATUS} ${PASSED} passes · ${TOTAL} total" >> $GITHUB_STEP_SUMMARY
            if [ "$SKIPPED" -gt 0 ]; then
              echo "- Skipped: ⏭️ ${SKIPPED}" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$FLAKY" -gt 0 ]; then
              echo "- Flaky: ⚠️ ${FLAKY}" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$FAILED" -gt 0 ]; then
              echo "- Failed: ❌ ${FAILED}" >> $GITHUB_STEP_SUMMARY
            fi
          fi
      - name: Last opp Playwright-rapport
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14

  build:
    name: Bygg
    permissions:
      packages: write
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      docker_image: ${{ steps.docker-build-push.outputs.image }}
      version_tag: ${{ steps.version-tag.outputs.VERSION_TAG }}

    steps:
      - name: Sjekk ut koden
        uses: actions/checkout@v6

      - name: Før deploy
        uses: navikt/digihot-deploy/actions/pre-deploy@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Autentiser med GitHub NPM registry
        run: |
          echo '//npm.pkg.github.com/:_authToken='${{ secrets.READER_TOKEN }} >> .npmrc

      - name: Bygg og push Docker image
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: teamdigihot
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          tag: ${{ env.VERSION_TAG }}
          build_secrets: NODE_AUTH_TOKEN=${{ secrets.READER_TOKEN }}

      - name: Definer release tag
        id: version-tag
        run: echo "VERSION_TAG=${{ env.VERSION_TAG }}" >> "$GITHUB_OUTPUT"

  deploy-labs:
    name: Deploy til labs-gcp
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 15

    steps:
      - name: Sjekk ut koden
        uses: actions/checkout@v6

      - name: Deploy
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/labs.yaml
          IMAGE: ${{ needs.build.outputs.docker_image }}

  deploy-dev:
    name: Deploy til dev-gcp
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 15
    env:
      VERSION_TAG: ${{ needs.build.outputs.version_tag }}

    steps:
      - name: Sjekk ut koden
        uses: actions/checkout@v6

      - name: Deploy
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/dev.yaml
          IMAGE: ${{ needs.build.outputs.docker_image }}

      - name: Etter deploy
        if: github.ref == 'refs/heads/main'
        uses: navikt/digihot-deploy/actions/post-deploy@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lag release
        if: github.ref == 'refs/heads/main'
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION_TAG }}
          release_name: ${{ env.APPLICATION }} ${{ env.VERSION_TAG }}
          body: ${{ env.CHANGE_LOG }}
          draft: true
          prerelease: false
