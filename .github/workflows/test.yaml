name: Kjør tester

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut koden
        uses: actions/checkout@v6

      - name: Autentiser med GitHub NPM registry
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.READER_TOKEN }}" >> ~/.npmrc
          echo "@navikt:registry=https://npm.pkg.github.com" >> ~/.npmrc
      - name: Sett opp Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Installer avhengigheter
        run: pnpm install --frozen-lockfile
        working-directory: client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Kjør enhetstester
        run: pnpm run test:ci
        working-directory: client
      - name: Installer Playwright
        run: pnpm exec playwright install --with-deps chromium
        working-directory: client
      - name: Kjør E2E-tester
        run: pnpm run e2e
        working-directory: client
      - name: Playwright test summary
        if: ${{ !cancelled() }}
        working-directory: client
        run: |
          if [ -f playwright-results.json ]; then
            PASSED=$(jq '.stats.expected' playwright-results.json)
            FAILED=$(jq '.stats.unexpected' playwright-results.json)
            SKIPPED=$(jq '.stats.skipped' playwright-results.json)
            FLAKY=$(jq '.stats.flaky' playwright-results.json)
            TOTAL=$((PASSED + FAILED + SKIPPED + FLAKY))
            if [ "$FAILED" -eq 0 ]; then
              STATUS="✅"
            else
              STATUS="❌"
            fi
            echo "# Playwright Test Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Test Results: ${STATUS} ${PASSED} passes · ${TOTAL} total" >> $GITHUB_STEP_SUMMARY
            if [ "$SKIPPED" -gt 0 ]; then
              echo "- Skipped: ⏭️ ${SKIPPED}" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$FLAKY" -gt 0 ]; then
              echo "- Flaky: ⚠️ ${FLAKY}" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$FAILED" -gt 0 ]; then
              echo "- Failed: ❌ ${FAILED}" >> $GITHUB_STEP_SUMMARY
            fi
          fi
      - name: Last opp Playwright-rapport
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14
