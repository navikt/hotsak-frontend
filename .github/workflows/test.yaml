name: Kjør tester

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut koden
        uses: actions/checkout@v6

      - name: Autentiser med GitHub NPM registry
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.READER_TOKEN }}" >> ~/.npmrc
          echo "@navikt:registry=https://npm.pkg.github.com" >> ~/.npmrc
      - name: Sett opp Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Installer avhengigheter
        run: pnpm install --frozen-lockfile
        working-directory: client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Kjør enhetstester
        run: pnpm run test:ci
        working-directory: client
      - name: Installer Playwright
        run: pnpm exec playwright install --with-deps chromium
        working-directory: client
      - name: Kjør E2E-tester
        run: pnpm run e2e
        working-directory: client
      - name: Last opp Playwright-rapport
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14
